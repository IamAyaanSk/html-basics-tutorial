<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <h1>Forms</h1>

    <form action="" method="post" enctype="multipart/form-data">
      <!-- Text Input -->
      <label for="name">Name: </label>
      <input
        type="text"
        id="name"
        name="fullName"
        minlength="4"
        maxlength="8"
      />

      <br />
      <br />

      <!-- Password Input -->
      <label for="password">Password</label>
      <input type="password" id="password" name="password" />

      <br />
      <br />

      <!-- Email Input -->
      <label for="email">Email</label>
      <input type="email" placeholder="Enter your email" id="email" />

      <br />
      <br />

      <!-- Phone Input -->
      <label for="phone">Phone</label>
      <!-- 10 digits 0-9 -->
      <input
        type="tel"
        id="phone"
        placeholder="Enter your number"
        pattern="^[0-9]{10}$"
      />

      <br />
      <br />

      <!-- Number Input -->
      <label for="number">Lucky Number: </label>
      <input type="number" id="number" min="0" max="10" value="2" />
      <br />
      <br />

      <!-- Radio buttons -->
      <label for="">Gender</label> <br />

      <label for="male">Male</label>
      <input type="radio" id="male" value="male" name="gender" />

      <label for="female">Female</label>
      <input type="radio" id="female" value="female" name="gender" />
      <br />
      <br />

      <!-- Dropdown -->
      <label for="color">Color: </label>
      <select id="color" name="color" multiple>
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="blue">Blue</option>
      </select>

      <br />
      <br />

      <!-- Checkbox -->
      <label for="">Select Subjects: </label> <br />

      <label for="physics">Physics</label>
      <input type="checkbox" id="physics" value="physics" name="subject" />

      <label for="maths">Maths</label>
      <input type="checkbox" id="maths" value="maths" name="subject" />

      <br />
      <br />

      <!-- Text area -->
      <label for="feedback">Feedback</label>
      <textarea
        name="feedback"
        placeholder="Post your feedback..."
        cols="50"
        rows="5"
        id="feedback"
      ></textarea>

      <br />
      <br />

      <!-- Date Input -->
      <label for="dob">Date of Birth: </label>
      <input type="date" id="dob" />
      <br />
      <br />

      <!-- File Input -->
      <label for="file">File: </label>
      <input type="file" id="file" accept="image/png, image/jpg" />
      <br />
      <br />

      <label for="favcolor">Select your favorite color:</label>
      <input type="color" id="favcolor" name="favcolor" value="#ff0000" />

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
