<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Image Tag -->
    <img src="/assets/img-demo.jpg" height="200" title="Market" alt="market" />
    <img
      src="https://images.unsplash.com/photo-1778532747971-5e57504f393c?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt="market"
      height="200"
    />

    <!-- SVG Tags -->
    <svg width="200" height="200">
      <rect width="200" height="200" fill="red" />
    </svg>

    <img src="/assets/rect-demo.svg" alt="" />

    <!-- Video Tags -->
    <video
      src="/assets/video-demo.mov"
      height="250"
      controls
      loop
      muted
      poster="/assets/img-demo.jpg"
    ></video>

    <video>
      <source src="/assets/video-demo.mov" type="video/quicktime" />
      <source src="/assets/video-demo.mp4" type="video/mp4" />
      This video is not supported by your browser
    </video>

    <!-- Audio Tag -->
    <audio src="/assets/audio-demo.mp3" controls autoplay loop muted></audio>

    <audio controls>
      <source src="/assets/audio-demo.mp3" type="audio/mp3" />

      This audio is not supported by your browser
    </audio>

    <!-- Iframes -->
    <h1>Hello, Welcome to my Website</h1>
    <iframe src="https://ayaan.dev" height="500" width="500"></iframe>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/gKbGiYteWvA?si=lJek5MkJJMFIyOow"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
